name: Extension CI

on:
  push:
    paths:
      - 'extension/**'
      - '.github/workflows/extension-ci.yml'
  pull_request:
    paths:
      - 'extension/**'
      - '.github/workflows/extension-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'extension/package-lock.json'

      - name: Install dependencies
        run: |
          cd extension
          npm install

      - name: Compile
        run: |
          cd extension
          npm run compile

      - name: Run tests
        run: |
          cd extension
          xvfb-run -a npm test
