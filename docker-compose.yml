services:
  daemon:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - ./daemon:/app
      - ./workspace:/workspace # The folder the daemon serves (writable)
    environment:
      - PYTHONPATH=/app
    command: ["python", "-m", "app.main", "--host", "0.0.0.0", "--port", "8765", "--folder", "/workspace", "--token", "verySecureToken@Ooops"]
    restart: unless-stopped

networks:
  default:
    name: remotefs-network
